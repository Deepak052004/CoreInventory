version: '3.8'

services:
  app:
    build: .
    ports:
      - "5005:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      # Note: MONGODB_URI should point to your Atlas cluster or the local mongo service below.
      # If using the local mongo service, uncomment the line below:
      # - MONGODB_URI=mongodb://mongo:27017/coreinventory
      - JWT_SECRET=docker_secret_jwt_token_2026
      - JWT_EXPIRE=15m
      - JWT_REFRESH_SECRET=docker_refresh_secret_jwt_token_2026
      - JWT_REFRESH_EXPIRE=7d
      - FRONTEND_URL=http://localhost:5005
      - OLLAMA_URL=http://ollama:11434
    env_file:
      - ./backend/.env
    # depends_on:
    #   - mongo
    restart: unless-stopped
    depends_on:
      - ollama

  # The local Ollama server running in Docker
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # An initialization container that runs once to download the Llama3.2 model
  # into the ollama_data volume so it is ready to use automatically.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: pull llama3.2

  # Uncomment the block below to run a local MongoDB instance instead of Atlas
  # mongo:
  #   image: mongo:6
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db
  #   restart: unless-stopped

# volumes:
#   mongo_data:
volumes:
  ollama_data:
